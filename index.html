<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mausam — Modern Weather</title>

  <!-- Tailwind CSS (utility layer) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <!-- Icons (for header buttons only) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- App styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased text-slate-100">
  <!-- App Shell -->
  <div id="app" class="min-h-dvh flex flex-col">

    <!-- Sticky Header -->
    <header class="backdrop-blur-xl/0 sticky top-0 z-40">
      <div class="container mx-auto px-5 lg:px-8">
        <div class="h-16 lg:h-20 flex items-center justify-between gap-4">
          <!-- Brand -->
          <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-xl grid place-items-center bg-gradient-to-br from-indigo-500 to-sky-500 shadow-md shadow-sky-900/30">
              <span class="font-mono text-sm">M</span>
            </div>
            <div>
              <h1 class="text-xl lg:text-2xl font-extrabold tracking-tight">Mausam</h1>
              <p class="text-xs text-slate-300/80">Simple, beautiful weather.</p>
            </div>
          </div>

          <!-- Controls -->
          <div class="flex items-center gap-2 sm:gap-3">
            <!-- Unit Segmented -->
            <div class="segmented" role="group" aria-label="Temperature unit">
              <button id="unitC" class="seg-item seg-active" type="button">°C</button>
              <button id="unitF" class="seg-item" type="button">°F</button>
            </div>

            <!-- Refresh -->
            <button id="refreshBtn" class="btn-ghost" title="Refresh all">
              <i class="fa-solid fa-rotate"></i><span class="hidden sm:inline">&nbsp;Refresh</span>
            </button>

            <!-- Locate -->
            <button id="geoBtn" class="btn-ghost" title="Use my location">
              <i class="fa-solid fa-location-crosshairs"></i>
            </button>

            <!-- Clear all -->
            <button id="clearBtn" class="btn-danger" title="Clear all">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>

        <!-- Search Bar -->
        <form id="searchForm" class="relative pb-4" autocomplete="off">
          <div class="search">
            <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
            <input id="cityInput" type="search" placeholder="Search city — e.g., Singapore"
                   class="search-input" />
            <button id="addBtn" type="submit" class="btn-primary">Add</button>
          </div>
          <div id="searchSuggestions" class="suggestions hidden"></div>
        </form>
      </div>
      <div class="sep"></div>
    </header>

    <!-- Main -->
    <main class="flex-1">
      <div class="container mx-auto px-5 lg:px-8 py-8">
        <!-- Grid of city cards -->
        <section id="cards" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 lg:gap-7"></section>

        <!-- Empty state -->
        <div id="empty" class="text-center pt-16">
          <div class="mx-auto h-28 w-28 rounded-2xl bg-gradient-to-br from-amber-400 to-pink-500 blur-[2px] opacity-90 shadow-2xl shadow-amber-900/30"></div>
          <h2 class="text-2xl font-bold mt-6">Welcome to Mausam</h2>
          <p class="text-slate-300/85 mt-2">Add a city or use your location to begin.</p>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Footer -->
   <footer class="py-6 text-center text-xs">
  <div class="container mx-auto px-5 lg:px-8">
    <div class="footer-row">
      <span class="footer-note">Powered by OpenWeather</span>

      <nav class="footer-social" aria-label="Social links">
        <a class="footer-link" href="https://www.linkedin.com/in/YOUR_HANDLE" target="_blank" rel="noopener">
          <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
          <span>LinkedIn</span>
        </a>
        <a class="footer-link" href="https://github.com/YOUR_HANDLE" target="_blank" rel="noopener">
          <i class="fa-brands fa-github" aria-hidden="true"></i>
          <span>GitHub</span>
        </a>
      </nav>
    </div>
  </div>
</footer>



  <!-- App script -->
  <script src="script.js" defer></script>
</body>
</html>
