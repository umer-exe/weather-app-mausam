<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mausam — Weather</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Header -->
    <header class="site-header">
      <div class="container header-row">
        <!-- Brand -->
        <a class="brand" href="#" aria-label="Mausam home">
          <span class="brand-mark" aria-hidden="true">
            <!-- Droplet (no square) -->
            <svg class="brand-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%"  stop-color="#a78bfa"/>
                  <stop offset="100%" stop-color="#60a5fa"/>
                </linearGradient>
                <filter id="brandGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              <path d="M24 6C30.6 14.7 36 22 36 28c0 6.6-5.4 12-12 12S12 34.6 12 28c0-6 5.4-13.3 12-22z"
                    fill="url(#brandGrad)" filter="url(#brandGlow)"/>
              <circle cx="35" cy="12.5" r="3.2" fill="#fff" opacity=".9"/>
            </svg>
          </span>
          <span class="brand-word">Mausam</span>
        </a>

        <!-- Controls -->
        <div class="controls">
          <div class="segmented" role="tablist" aria-label="Temperature unit">
            <button id="btnC" class="seg-item seg-active" role="tab" aria-selected="true">°C</button>
            <button id="btnF" class="seg-item" role="tab" aria-selected="false">°F</button>
          </div>

          <button id="refreshBtn" class="icon-btn" title="Refresh" aria-label="Refresh">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M21 5v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <button id="geoBtn" class="icon-btn" title="Use my location" aria-label="Use my location">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>

          <button id="clearBtn" class="icon-btn danger" title="Clear all" aria-label="Clear all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="container">
        <form id="searchForm" class="search" autocomplete="off">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="cityInput" class="search-input" type="search" placeholder="Search city — e.g., Karachi" aria-label="Search city"/>
          <button id="addBtn" type="submit" class="btn-primary">Add</button>
        </form>
      </div>
    </header>

    <!-- Main -->
    <main class="container main">
      <!-- Empty state / Hero -->
      <section id="empty" class="empty">
        <span class="hero-mark" aria-hidden="true">
          <svg class="hero-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#60a5fa"/>
              </linearGradient>
              <filter id="heroGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5" result="g"/>
                <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <path d="M24 6C30.6 14.7 36 22 36 28c0 6.6-5.4 12-12 12S12 34.6 12 28c0-6 5.4-13.3 12-22z"
                  fill="url(#heroGrad)" filter="url(#heroGlow)"/>
            <circle cx="35" cy="12.5" r="3.2" fill="#fff" opacity=".9"/>
          </svg>
        </span>
        <h1>Welcome to Mausam</h1>
        <p>Add a city or use your location to begin.</p>
      </section>

      <!-- Cards -->
      <section id="cards" class="cards"></section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container foot-row">
        <span class="foot-note">Powered by OpenWeather</span>
        <nav class="foot-links" aria-label="social links">
          <a class="foot-link" href="#" target="_blank" rel="noopener">LinkedIn</a>
          <a class="foot-link" href="#" target="_blank" rel="noopener">GitHub</a>
        </nav>
      </div>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js" defer></script>
</body>
</html>
